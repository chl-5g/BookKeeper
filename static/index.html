<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智小账</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
    <!-- 登录/注册页 -->
    <div v-if="!user" class="auth-page">
        <div class="auth-logo">智小账</div>
        <div class="card auth-card">
            <div class="type-switch">
                <button :class="{'active-income': authMode === 'login'}" @click="authMode='login'">登录</button>
                <button :class="{'active-income': authMode === 'register'}" @click="authMode='register'">注册</button>
            </div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" v-model="authForm.username" placeholder="请输入用户名" @keyup.enter="submitAuth">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" v-model="authForm.password" placeholder="请输入密码" @keyup.enter="submitAuth">
            </div>
            <div v-if="authError" class="auth-error">{{ authError }}</div>
            <button class="submit-btn" @click="submitAuth">{{ authMode === 'login' ? '登录' : '注册' }}</button>
        </div>
    </div>

    <!-- 主界面 -->
    <template v-if="user">
        <div class="header">
            <span>{{ pageTitle }}</span>
            <div class="header-right">
                <span class="header-user">{{ user }}</span>
                <button class="header-logout" @click="doLogout">退出</button>
            </div>
        </div>

        <!-- 首页 -->
        <div class="page" :class="{active: tab === 'home'}">
            <div class="month-selector">
                <button @click="changeMonth(-1)">&lt;</button>
                <span class="month-text">{{ currentMonth }}</span>
                <button @click="changeMonth(1)">&gt;</button>
            </div>
            <div class="card overview">
                <div class="item">
                    <div class="label">收入</div>
                    <div class="value income">{{ stats.income_total.toFixed(2) }}</div>
                </div>
                <div class="item">
                    <div class="label">支出</div>
                    <div class="value expense">{{ stats.expense_total.toFixed(2) }}</div>
                </div>
                <div class="item">
                    <div class="label">结余</div>
                    <div class="value">{{ (stats.income_total - stats.expense_total).toFixed(2) }}</div>
                </div>
            </div>
            <!-- 异常预警 -->
            <div v-if="alerts.length" class="card" style="border-left:4px solid #f44336;">
                <div class="section-title" style="color:#f44336;">消费预警</div>
                <div v-for="a in alerts" :key="a.message" style="font-size:0.8rem;color:#666;padding:4px 0;line-height:1.6;">
                    {{ a.type === 'large' ? '💰' : '📈' }} {{ a.message }}
                </div>
            </div>
            <!-- 预算进度 -->
            <div class="card" v-if="budgetInfo.budget">
                <div class="section-title">本月预算</div>
                <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:6px;">
                    <span>已支出 {{ budgetInfo.expense_total }} / {{ budgetInfo.budget }} 元</span>
                    <span :style="{color: budgetInfo.remaining < 0 ? '#f44336' : '#4CAF50'}">剩余 {{ budgetInfo.remaining }} 元</span>
                </div>
                <div style="background:#eee;border-radius:6px;height:8px;overflow:hidden;">
                    <div :style="{width: Math.min(budgetInfo.expense_total/budgetInfo.budget*100, 100)+'%', height:'100%', background: budgetInfo.remaining<0?'#f44336':'#4CAF50', borderRadius:'6px', transition:'width 0.3s'}"></div>
                </div>
            </div>
            <div class="card ai-banner">
                <div style="display:flex;align-items:flex-start;gap:12px;">
                    <div style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:bold;font-size:12px;padding:8px 10px;border-radius:10px;flex-shrink:0;">AI</div>
                    <div>
                        <div style="font-weight:bold;font-size:14px;color:#333;">AI 智能分类</div>
                        <div style="font-size:12px;color:#666;line-height:1.7;margin-top:4px;">
                            本应用集成 AI 大模型（qwen3:14b），在记账时输入备注即可自动识别消费类型。例如输入"星巴克拿铁"会自动归类为"餐饮"，输入"滴滴打车"归类为"交通"，免去手动选择分类的麻烦。AI 模型运行在本地服务器，数据不外传。
                        </div>
                    </div>
                </div>
            </div>
            <div class="card" style="display:flex;justify-content:flex-end;">
                <button style="background:none;border:1px solid #f44336;color:#f44336;padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;" @click="clearAllRecords">清空全部记录</button>
            </div>
            <div class="card">
                <div class="section-title">最近记录</div>
                <div v-if="records.length === 0" class="empty">暂无记录</div>
                <div v-for="r in records" :key="r.id" class="record-item">
                    <span class="icon">{{ getCatIcon(r.category) }}</span>
                    <div class="info">
                        <div class="cat">{{ r.category }}</div>
                        <div class="note" v-if="r.note">{{ r.note }}</div>
                    </div>
                    <span class="amount" :class="r.type">{{ r.type === 'income' ? '+' : '-' }}{{ r.amount.toFixed(2) }}</span>
                    <span class="date-text">{{ r.date.slice(5) }}</span>
                    <button class="delete-btn" @click="deleteRecord(r.id)">×</button>
                </div>
            </div>
        </div>

        <!-- 记账 -->
        <div class="page" :class="{active: tab === 'add'}">
            <div class="card">
                <div class="type-switch">
                    <button :class="{'active-expense': form.type === 'expense'}" @click="form.type='expense'; form.category=''">支出</button>
                    <button :class="{'active-income': form.type === 'income'}" @click="form.type='income'; form.category=''">收入</button>
                </div>
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" v-model.number="form.amount" placeholder="0.00" step="0.01" inputmode="decimal">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" v-model="form.note" placeholder="输入备注，AI自动识别分类" @blur="aiClassify">
                </div>
                <div v-if="aiHint" class="ai-hint" @click="form.category = aiHint">AI建议：{{ aiHint }}（点击采用）</div>
                <div class="form-group">
                    <label>分类</label>
                    <div class="category-grid">
                        <div v-for="c in filteredCategories" :key="c.id" class="cat-btn" :class="{active: form.category === c.name}" @click="form.category = c.name">
                            <span class="cat-icon">{{ c.icon }}</span>
                            <span>{{ c.name }}</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" v-model="form.date">
                </div>
                <button class="submit-btn" @click="submitRecord" :disabled="!canSubmit">记一笔</button>
            </div>
            <div class="card">
                <div class="section-title">导入账单</div>
                <p style="font-size:0.8rem;color:#888;margin-bottom:10px;">支持支付宝/微信导出的 CSV 和 Excel（xlsx/xls）账单文件</p>
                <details style="font-size:0.8rem;color:#666;margin-bottom:12px;line-height:1.8;">
                    <summary style="color:#667eea;cursor:pointer;font-weight:bold;">如何导出账单文件？</summary>
                    <div style="margin-top:8px;padding:10px;background:#f8f8ff;border-radius:8px;">
                        <b style="color:#667eea;">支付宝：</b><br>
                        1. 打开支付宝 → 我的 → 账单<br>
                        2. 点击右上角「...」→ 开具交易流水证明<br>
                        3. 选择时间范围 → 用于个人对账<br>
                        4. 申请后发到邮箱，下载 CSV 文件<br><br>
                        <b style="color:#667eea;">微信：</b><br>
                        1. 微信 → 我 → 服务 → 钱包<br>
                        2. 点击右上角「账单」→ 常见问题<br>
                        3. 选择「下载账单」→ 用于个人对账<br>
                        4. 选择时间范围，发送到邮箱后下载
                    </div>
                </details>
                <input type="file" accept=".csv,.xlsx,.xls" @change="importCSV" ref="csvInput" style="display:none">
                <button class="submit-btn" style="background:#1890ff" @click="$refs.csvInput.click()">选择账单文件</button>
                <div v-if="importResult" class="import-result" :class="{error: importResult.error}">
                    {{ importResult.error || `导入成功！来源：${importResult.source === 'alipay' ? '支付宝' : '微信'}，导入 ${importResult.imported} 条，跳过 ${importResult.skipped} 条` }}
                </div>
            </div>
        </div>

        <!-- 统计 -->
        <div class="page" :class="{active: tab === 'stats'}">
            <div class="month-selector">
                <button @click="changeMonth(-1)">&lt;</button>
                <span class="month-text">{{ currentMonth }}</span>
                <button @click="changeMonth(1)">&gt;</button>
            </div>
            <div class="card">
                <div class="section-title">支出分类</div>
                <div id="pie-chart" class="chart-container"></div>
            </div>
            <div class="card" v-if="stats.income_categories && stats.income_categories.length">
                <div class="section-title">收入分类</div>
                <div id="income-pie-chart" class="chart-container"></div>
            </div>
            <div class="card">
                <div class="section-title">收支趋势</div>
                <div id="trend-chart" class="chart-container"></div>
            </div>
            <div class="card">
                <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
                    <span>AI 财务报告</span>
                    <button class="ai-report-btn" @click="generateReport" :disabled="reportLoading">
                        {{ reportLoading ? '生成中...' : '生成报告' }}
                    </button>
                </div>
                <div v-if="reportLoading" class="report-loading">
                    <div class="loading-spinner"></div>
                    <span>AI 正在分析您的收支数据...</span>
                </div>
                <div v-if="reportText && !reportLoading" class="report-content" v-html="renderMarkdown(reportText)"></div>
                <div v-if="!reportText && !reportLoading" class="report-placeholder">
                    点击「生成报告」，AI 将分析本月收支数据，提供消费分析和理财建议
                </div>
            </div>
            <!-- 消费画像 -->
            <div class="card">
                <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
                    <span>消费习惯画像</span>
                    <button class="ai-report-btn" @click="generateProfile" :disabled="profileLoading">
                        {{ profileLoading ? '分析中...' : '生成画像' }}
                    </button>
                </div>
                <div v-if="profileLoading" class="report-loading">
                    <div class="loading-spinner"></div>
                    <span>AI 正在分析您的消费习惯...</span>
                </div>
                <div v-if="profileText && !profileLoading" class="report-content" v-html="renderMarkdown(profileText)"></div>
                <div v-if="!profileText && !profileLoading" class="report-placeholder">
                    分析多月消费数据，生成您的专属消费画像
                </div>
            </div>
        </div>

        <!-- AI 助手 -->
        <div class="page" :class="{active: tab === 'ai'}">
            <!-- 智能记账 -->
            <div class="card">
                <div class="section-title">智能记账</div>
                <p style="font-size:0.8rem;color:#888;margin-bottom:10px;">输入自然语言，AI 自动解析。如："昨天星巴克38"、"工资到账15000"</p>
                <div style="display:flex;gap:8px;">
                    <input type="text" v-model="smartText" placeholder="说一句话记账..." style="flex:1;" @keyup.enter="smartAdd">
                    <button class="ai-report-btn" @click="smartAdd" :disabled="smartLoading">{{ smartLoading ? '解析中' : '解析' }}</button>
                </div>
                <div v-if="smartResult" class="card" style="margin-top:10px;background:#f8f8ff;">
                    <div style="font-size:0.85rem;line-height:1.8;">
                        <b>{{ smartResult.type === 'income' ? '收入' : '支出' }}</b> ¥{{ smartResult.amount }}<br>
                        分类：{{ smartResult.category }}　备注：{{ smartResult.note }}<br>
                        日期：{{ smartResult.date }}
                    </div>
                    <div style="display:flex;gap:8px;margin-top:8px;">
                        <button class="submit-btn" style="flex:1;" @click="confirmSmartAdd">确认记账</button>
                        <button style="flex:1;background:#eee;color:#666;border:none;border-radius:8px;padding:8px;cursor:pointer;" @click="smartResult=null">取消</button>
                    </div>
                </div>
                <div v-if="smartError" style="color:#f44336;font-size:0.8rem;margin-top:8px;">{{ smartError }}</div>
            </div>
            <!-- 账单问答 -->
            <div class="card">
                <div class="section-title">账单问答</div>
                <p style="font-size:0.8rem;color:#888;margin-bottom:10px;">问任何关于你收支的问题，如："这个月吃饭花了多少？""哪个月花钱最多？"</p>
                <div style="display:flex;gap:8px;">
                    <input type="text" v-model="chatQuestion" placeholder="问一个问题..." style="flex:1;" @keyup.enter="askChat">
                    <button class="ai-report-btn" @click="askChat" :disabled="chatLoading">{{ chatLoading ? '思考中' : '提问' }}</button>
                </div>
                <div v-if="chatLoading" class="report-loading">
                    <div class="loading-spinner"></div>
                    <span>AI 正在查阅您的账单...</span>
                </div>
                <div v-if="chatAnswer && !chatLoading" class="report-content" v-html="renderMarkdown(chatAnswer)"></div>
            </div>
            <!-- 预算设定 -->
            <div class="card">
                <div class="section-title">预算设定（{{ currentMonth }}）</div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="number" v-model.number="budgetAmount" placeholder="输入月预算金额" style="flex:1;" step="100">
                    <button class="ai-report-btn" @click="setBudget">设定</button>
                </div>
                <div v-if="budgetInfo.budget" style="margin-top:10px;">
                    <button class="ai-report-btn" @click="getBudgetAdvice" :disabled="budgetAdviceLoading" style="width:100%;">
                        {{ budgetAdviceLoading ? 'AI 分析中...' : 'AI 预算建议' }}
                    </button>
                    <div v-if="budgetAdviceText" class="report-content" v-html="renderMarkdown(budgetAdviceText)"></div>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item" :class="{active: tab === 'home'}" @click="switchTab('home')">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item" :class="{active: tab === 'add'}" @click="switchTab('add')">
                <span class="nav-icon">✏️</span>
                <span>记账</span>
            </div>
            <div class="nav-item" :class="{active: tab === 'stats'}" @click="switchTab('stats')">
                <span class="nav-icon">📊</span>
                <span>统计</span>
            </div>
            <div class="nav-item" :class="{active: tab === 'ai'}" @click="switchTab('ai')">
                <span class="nav-icon">🤖</span>
                <span>AI</span>
            </div>
        </div>
    </template>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/echarts@5/dist/echarts.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
